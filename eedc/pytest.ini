[pytest]
# pytest-Konfiguration für EEDC Backend.
#
# Aufruf aus dem `eedc/`-Verzeichnis:
#   ./backend/venv/bin/pytest
# oder via Smoke-Skript:
#   ./../scripts/smoke.sh
#
# `asyncio_mode = auto` lässt jede `async def test_*` automatisch laufen, ohne
# dass jeder Test mit `@pytest.mark.asyncio` dekoriert werden muss — die 31
# Akzeptanz-Tests bleiben damit unverändert vom Standalone-Driver-Stand
# (Etappe 3d Päckchen 1–4).

testpaths = backend/tests
python_files = test_*.py
asyncio_mode = auto

# Loop-Scope expliziert — sonst warnt pytest-asyncio in Version 1.x dass der
# Default sich ändern könnte. Test-DBs sind in-memory und pro Test frisch,
# also ist `function`-Scope semantisch korrekt.
asyncio_default_fixture_loop_scope = function

# Filter aufgehende DeprecationWarnings aus Drittbibliotheken stumm — der
# Smoke-Run soll grün bleiben oder echtes Problem zeigen, kein Rauschen.
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:passlib.*
    ignore:.*class-based `config`.*:DeprecationWarning
    ignore:.*datetime.datetime.utcnow.*:DeprecationWarning
